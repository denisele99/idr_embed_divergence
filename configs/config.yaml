project:
  name: idr-functional-divergence
  seed: 123
  threads: 8

paths:
  data_dir: data
  results_dir: results
  cache_dir: .cache

inputs:
  species: human
  ensembl_release: 112
  uniprot_release: "2025_04"
  idr_table: data/processed/human_idrs.tsv
  domain_table: data/processed/human_domains.tsv

general:
  cdk_uniprot_ids: O94921 P06493 P11802 P24941 P49336 P50613 P50750 Q00526 Q00534 Q00535 Q00536 Q00537 Q07002 Q14004 Q15131 Q8IZL9 Q96Q40 Q9BWU1 Q9NYV4 Q9UQ88 P21127

distance:
  metric: cosine
  
  

go:
  go_obo: ../data/annotations/go_2024.obo #../data/annotations/go_2024.obo # Download from http://purl.obolibrary.org/obo/go/go-basic.obo
  go_annotations: ../data/annotations/uniprot_GO_annotations_2024.tsv #/home/moseslab/denise/IDR_LM/data/annotations/idr_annotations/uniprotkb_Human_AND_model_organism_9606_2024_08_20.tsv'
  knn: 50

  

  obo_path: data/metadata/go-basic.obo
  gaf_path: data/metadata/goa_human.gaf.gz
  namespace: BP              # BP / MF / CC
  exclude_evidence: ["IEA"]
  min_genes: 5
  correction: fdr_bh         # bonferroni, holm, fdr_bh...
  alpha: 0.05

distance:
  metric: neighbour_distance
  background: human_idrs     # human_idrs or human_domains
  log_transform:
    enabled: true
    base: 10
    epsilon: 1e-8            # only used if zeros possible

embeddings:
  model_name: "Rostlab/prot_bert"
  checkpoint_path: models/idr_lm_final.pt   # or URL
  pooling: mean
  layer: last
  max_length: 512
  batch_size: 16
  device: cuda               # cpu/cuda

permutation_test:
  enabled: true
  n_permutations: 1000
  null_sampling: random_unrelated_idrs
  two_sided: false

figures:
  make: true
  formats: ["pdf", "png"]
  dpi: 300
