inputs:
  background_emb: /home/moseslab/denise/Paper/data/embed/human_idrs_pos_updated_esm.csv  #/home/moseslab/denise/Paper/data/embed/human_PFAM_esm_updated.csv #  # #/data/embeddings/human_idr_background.csv
  ortholog_emb: /home/moseslab/denise/embeddings/esm1b/idr_orthologs_fixed_names #/home/moseslab/denise/Paper/data/embed/unrelated_pfam_sample_combined_esm.h5  #/home/moseslab/denise/Paper/data/embed/unrelated_pfam_sample_07-31-25_esm.h5 #/home/moseslab/denise/Paper/data/embed/unrelated_pfam_sample_10_23_25_esm.h5 #/home/moseslab/denise/Paper/data/embed/CDK_PFAM_ortho_07_31_25_esm.csv # #/data/embeddings/orthologs/ #file of ortholog embeddings or directory of ortholog embeddings
  fam_map: /home/moseslab/denise/Paper/src/idr_diverge/distances/input_args/family_to_genes.json #/home/moseslab/denise/Paper/src/idr_diverge/distances/input_args/rand_genes_pfam_100.json #/home/moseslab/denise/Paper/src/idr_diverge/distances/input_args/rand_genes_pfam.json #/home/moseslab/denise/Paper/src/distances/current/cdk_to_genes.json #/home/moseslab/denise/Paper/src/distances/current/family_to_genes.json #Optional but required if random_neighbour_divergence is false

outputs:
  out_distance: /home/moseslab/denise/Paper/res/ndist/fam_ndist_corrected #/home/moseslab/denise/Paper/res/ndist/rand_ndist/ #/results/fam_divergence/ #directory or specific file to save distance_dict results to
  #out_random: /home/moseslab/denise/Paper/res/ndist/rand_ndist/rand_100_idr_03_31_nofilt_gpos #/results/random_divergence/random_bg_distance_matrix.pkl #file to save random background distance matrix to. should be different from fam_distance_matrix output path to avoid confusion
  overwrite: false

compute:
  #metric: cosine
  chunk_size: 5000 #1000 #5000
  n_jobs: 1 #split fams into different jobs (or diff segments for within)


#Calculate divergence: fam neighbour divergence OR random neighbour divergence

ortholog_filter:
  enabled: true
  ortholog_types: ortholog_one2one_one2many #- ortholog_one2one | ortholog_one2many | ortholog_one2one_one2many
  min_species_coverage: 0.5
  min_species: 10
  homolog_annotation: /home/moseslab/denise/Paper/data/annotations/ensembl_homol_reference_10-10.pkl

neighbour_divergence:
  dist_type: between      # between | within 
  segment: IDR #IDR            #just for naming purposes, not used in code
  return_mode: aggregate # aggregate | per_gene Only affects within divergence calculation. Between divergence will always return per_gene
  #out_distance: /results/ortholog_divergence/
  #Put chunk_size and n_jobs here?

random_neighbour_divergence: #dist_type, segment, and return mode parameters are used from neighbour_divergence setting.
  enabled: false
  sample_size: 100 #default 100 segments
  random_seed: 42
  out_random: /home/moseslab/denise/Paper/res/ndist/rand_ndist/rand_100_bw_idr_diverge #/home/moseslab/denise/Paper/res/ndist/rand_ndist/rand_5_idr # #file to save random background distance matrix to. should be different from fam_distance_matrix output path to avoid confusion
  #dist_type: within
  #segment: IDR  #just for naming purposes, not used in code
  #return_mode: per_gene # aggregate | per_gene Only affects within divergence calculation. Between divergence will always return per_gene
  #out_random: /results/ortholog_divergence/random_bg_distance_matrix.pkl #file to save random background distance matrix to. should be different from fam_distance_matrix output path to avoid confusion
  

run:
  verbose: true #TODO this is not implemented

calculate_FND:
  enabled: false
  bg_distance_matrix: /home/moseslab/denise/Paper/res/ndist/rand_ndist/rand_100_idr_03_31_nofilt_gpos.pkl #/home/moseslab/denise/Paper/res/ndist/rand_ndist/rand_100_idr2.pkl #null #optional, if not provided will compute within ortholog distances from random background embeddings **FILE PATH
  #Path to ndist file or to directory. Default - select files that end with diverge.pkl
  fam_distance_matrix: /home/moseslab/denise/Paper/res/ndist/rand_ndist_bw #/home/moseslab/denise/Paper/res/ndist/fam_ndist  #/home/moseslab/denise/Paper/res/ndist/rand_ndist_bw # #/home/moseslab/denise/Paper/res/ndist/fam_ndist/12_between_IDR_diverge.pkl #null #optional, if not provided will compute distances from ortholog embeddings referenced in fam_map **DIRECTORY PATH
  output_results: /home/moseslab/denise/Paper/res/FND/FND_random_bw_results.csv #FND_random_bw_results.csv